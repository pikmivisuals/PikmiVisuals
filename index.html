<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PikmiVisuals | Dark Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0e14;
            --accent-purple: #7000ff;
            --accent-lavender: #b085ff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* TOAST */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(-20px);
            transition: 0.4s ease;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* background */
        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, var(--accent-lavender) 0%, transparent 70%);
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        header {
            display: flex;
            justify-content: space-between;
            padding: 20px 10%;
            align-items: center;
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent-lavender));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 50%, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .download-main {
            padding: 18px 45px;
            font-size: 1.1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            gap: 10px;
            text-decoration: none;
        }

        .download-main:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }

    </style>
</head>

<body>

<!-- TOAST -->
<div class="toast" id="toast">Загрузка началась...</div>

<div class="glow-bg">
    <div class="blob"></div>
    <div class="blob blob-2"></div>
</div>

<header>
    <div class="logo">PikmiVisuals</div>
</header>

<section class="hero">
    <h1>PikmiVisuals</h1>
    <p>Не будь нубом! Качай сейчас</p>

    <a href="https://workupload.com/start/XQ3xkt3PrsK"
       class="download-main"
       target="_blank"
       id="downloadBtn">
        Скачать
    </a>
</section>

<script>
    const toast = document.getElementById("toast");

    document.getElementById("downloadBtn").addEventListener("click", () => {
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 3000);
    });
</script>

</body>
</html>
